# infra/field-vet-config.yaml — Wafrivet Field Vet Phase 6
# ──────────────────────────────────────────────────────────
# Cloud Deployment Manager configuration for the fieldvet-backend Cloud Run
# service.  Passes parameter values into the field-vet-cloudrun.jinja template.
#
# One-time setup (create deployment):
#   gcloud deployment-manager deployments create fieldvet-backend \
#     --config infra/field-vet-config.yaml \
#     --project wafrivet-agent
#
# Update after config changes:
#   gcloud deployment-manager deployments update fieldvet-backend \
#     --config infra/field-vet-config.yaml \
#     --project wafrivet-agent
#
# View deployment status:
#   gcloud deployment-manager deployments describe fieldvet-backend \
#     --project wafrivet-agent

imports:
- path: field-vet-cloudrun.jinja

resources:
- name: fieldvet-backend
  type: field-vet-cloudrun.jinja
  properties:
    # ── Service identity ───────────────────────────────────────────────────
    serviceName: fieldvet-backend
    region: us-central1

    # Full Artifact Registry image URI.
    # cloudbuild.yaml pushes both :latest and :<SHORT_SHA> on every build.
    # The :latest tag here ensures Deployment Manager always deploys the
    # most recent successful build.
    image: us-central1-docker.pkg.dev/wafrivet-agent/fieldvet-images/backend:latest

    # Service account that Cloud Run instances impersonate at runtime.
    # Requires: roles/secretmanager.secretAccessor (per-secret),
    #           roles/aiplatform.user (Vertex AI embedding calls in disease.py)
    serviceAccount: fieldvet-backend@wafrivet-agent.iam.gserviceaccount.com

    # ── WebSocket-optimised scaling settings ───────────────────────────────
    # Maximum WebSocket session duration.  Cloud Run maximum is 3600 s.
    timeoutSeconds: 3600

    # Minimum warm instances — 1 prevents scale-to-zero from killing active
    # WebSocket connections mid-conversation.
    minInstances: 1

    # Hard auto-scaling ceiling — prevents runaway cost during a traffic spike.
    maxInstances: 10

    # ── Container resource limits ──────────────────────────────────────────
    # 1Gi RAM is sufficient for FastAPI + ADK + Supabase client at concurrency=80.
    # Increase to 2Gi if Vertex AI embedding responses cause OOM restarts.
    memory: 1Gi
    cpu: "1"
